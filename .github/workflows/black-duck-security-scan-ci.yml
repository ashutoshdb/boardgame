name: coverity-ss-action

on:
  push:
    branches: [ main, master, develop, stage, release ]

  pull_request:
    branches: [ main, master, develop, stage, release ]

  workflow_dispatch:

jobs:
  coverity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Coverity URL
        run: |
          echo "COVERITY_URL='${{ vars.COVERITY_URL }}'"

      - name: Coverity Scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          coverity_url: ${{ vars.COVERITY_URL }}
          coverity_user: ${{ secrets.COV_USER }}
          coverity_passphrase: ${{ secrets.COVERITY_PASSPHRASE }}

          coverity_policy_view: ${{ github.event_name != 'pull_request' && 'Outstanding Issues' || '' }}
          coverity_prComment_enabled: true

          # coverity_build_command: mvn -B clean
          coverity_build_command: mvn -B -DskipTests package

          github_token: ${{ secrets.GITHUB_TOKEN }}
          include_diagnostics: true
