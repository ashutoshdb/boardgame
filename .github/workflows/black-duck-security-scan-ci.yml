name: coverity-ss-action

on:
  push:
    branches:
      - main
      - master
      - develop
      - stage
      - release

  pull_request:
    branches:
      - main
      - master
      - develop
      - stage
      - release

  workflow_dispatch:

jobs:
  coverity:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Configuration
        run: |
          echo "Coverity URL: ${{ vars.COVERITY_URL }}"

      - name: Coverity Scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          coverity_url: ${{ vars.COVERITY_URL }}
          coverity_user: ${{ secrets.COV_USER }}
          coverity_passphrase: ${{ secrets.COV_PASSPHRASE }}

          coverity_build_command: mvn -B -DskipTests package
          coverity_clean_command: mvn -B clean

          coverity_prComment_enabled: true
          coverity_policy_view: ${{ github.event_name != 'pull_request' && 'Outstanding Issues' || '' }}

          github_token: ${{ secrets.GITHUB_TOKEN }}
          include_diagnostics: true
